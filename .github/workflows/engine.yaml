name: Build C++ Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get install -y cmake build-essential

      - name: Build
        run: |
          cd engine
          mkdir build && cd build
          cmake..
          make

      - name: Run tests
        run: cd engine/build &&./bei_engine_test