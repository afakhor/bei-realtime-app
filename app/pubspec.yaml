name: bei_realtime_app
description: Real-time IDX crypto data with C++ engine
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  ffi: ^2.1.2              # buat manggil C++
  web_socket_channel: ^2.4.0   # buat Binance websocket di Dart
  provider: ^6.1.2        # state management
  fl_chart: ^0.68.0       # chart candlestick
  path_provider: ^2.1.3   # akses folder buat load .so
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  #assets:
   # - assets/libbei_engine.so  # taro .so C++ di sini biar kebundle ke APK